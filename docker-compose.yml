# =============================================================
# matrix-stack — production compose for Hetzner (vir-hel)
# Deployed under /home/vir/stacks/matrix-stack/ alongside other
# vir.group services. Traefik runs in /home/vir/stacks/traefik
# with provider=docker on the external `traefik-public` network.
#
# Stack: Synapse + Postgres + Redis + Synapse-Admin + bridge-api
#        + Sygnal (FCM/APNs) + LiveKit (group SFU) + coturn (TURN/STUN)
# =============================================================

networks:
  matrix-internal:
    driver: bridge
  traefik-public:
    external: true

volumes:
  synapse-data:
  postgres-matrix-data:
  redis-matrix-data:

services:

  # -----------------------------------------------------------
  # Postgres — dedicated to Synapse (NOT the Supabase one)
  # -----------------------------------------------------------
  postgres-matrix:
    image: postgres:16-alpine
    container_name: postgres-matrix
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MATRIX_PG_USER}
      POSTGRES_PASSWORD: ${MATRIX_PG_PASSWORD}
      POSTGRES_DB: ${MATRIX_PG_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-matrix-data:/var/lib/postgresql/data
    networks: [matrix-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MATRIX_PG_USER} -d ${MATRIX_PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------
  # Redis — replication / presence / caching
  # -----------------------------------------------------------
  redis-matrix:
    image: redis:7-alpine
    container_name: redis-matrix
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${MATRIX_REDIS_PASSWORD}", "--save", "60", "1000"]
    volumes:
      - redis-matrix-data:/data
    networks: [matrix-internal]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${MATRIX_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------
  # Synapse — Matrix homeserver
  # -----------------------------------------------------------
  synapse:
    build:
      context: ./synapse
      dockerfile: Dockerfile
    container_name: synapse
    restart: unless-stopped
    depends_on:
      postgres-matrix:
        condition: service_healthy
      redis-matrix:
        condition: service_healthy
    environment:
      SYNAPSE_SERVER_NAME: ${SYNAPSE_SERVER_NAME}
      SYNAPSE_PUBLIC_BASEURL: ${SYNAPSE_PUBLIC_BASEURL}
      SYNAPSE_REPORT_STATS: ${SYNAPSE_REPORT_STATS}
      SYNAPSE_ENABLE_REGISTRATION: ${SYNAPSE_ENABLE_REGISTRATION}
      SYNAPSE_ALLOW_GUEST_ACCESS: ${SYNAPSE_ALLOW_GUEST_ACCESS}
      SYNAPSE_PASSWORD_LOGIN_ENABLED: ${SYNAPSE_PASSWORD_LOGIN_ENABLED}
      SYNAPSE_REGISTRATION_SHARED_SECRET: ${SYNAPSE_REGISTRATION_SHARED_SECRET}
      SYNAPSE_MACAROON_SECRET_KEY: ${SYNAPSE_MACAROON_SECRET_KEY}
      SYNAPSE_FORM_SECRET: ${SYNAPSE_FORM_SECRET}
      SYNAPSE_MAX_UPLOAD_SIZE_MB: ${SYNAPSE_MAX_UPLOAD_SIZE_MB}
      MATRIX_PG_HOST: ${MATRIX_PG_HOST}
      MATRIX_PG_PORT: ${MATRIX_PG_PORT}
      MATRIX_PG_USER: ${MATRIX_PG_USER}
      MATRIX_PG_PASSWORD: ${MATRIX_PG_PASSWORD}
      MATRIX_PG_DB: ${MATRIX_PG_DB}
      MATRIX_REDIS_PASSWORD: ${MATRIX_REDIS_PASSWORD}
      COTURN_REALM: ${COTURN_REALM}
      COTURN_STATIC_AUTH_SECRET: ${COTURN_STATIC_AUTH_SECRET}
    volumes:
      - synapse-data:/data
    networks: [matrix-internal, traefik-public]
    expose:
      - "8008"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      # HTTPS — main Synapse client API
      - traefik.http.routers.synapse.entrypoints=https
      - traefik.http.routers.synapse.rule=Host(`matrix.vir.group`)
      - traefik.http.routers.synapse.priority=50
      - traefik.http.routers.synapse.tls=true
      - traefik.http.routers.synapse.tls.certresolver=letsencrypt
      - traefik.http.routers.synapse.service=synapse
      # HTTP → HTTPS redirect
      - traefik.http.routers.synapse-http.entrypoints=http
      - traefik.http.routers.synapse-http.rule=Host(`matrix.vir.group`)
      - traefik.http.routers.synapse-http.priority=50
      - traefik.http.routers.synapse-http.middlewares=matrix-redirect
      - traefik.http.middlewares.matrix-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.matrix-redirect.redirectscheme.permanent=true
      - traefik.http.services.synapse.loadbalancer.server.port=8008
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # -----------------------------------------------------------
  # Synapse-Admin — web UI for moderation / user management
  # -----------------------------------------------------------
  synapse-admin:
    image: awesometechnologies/synapse-admin:0.10.3
    container_name: synapse-admin
    restart: unless-stopped
    environment:
      REACT_APP_SERVER: ${SYNAPSE_PUBLIC_BASEURL}
    networks: [matrix-internal, traefik-public]
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.synapse-admin.entrypoints=https
      - traefik.http.routers.synapse-admin.rule=Host(`admin.matrix.vir.group`)
      - traefik.http.routers.synapse-admin.priority=50
      - traefik.http.routers.synapse-admin.tls=true
      - traefik.http.routers.synapse-admin.tls.certresolver=letsencrypt
      - traefik.http.routers.synapse-admin.service=synapse-admin
      - traefik.http.routers.synapse-admin-http.entrypoints=http
      - traefik.http.routers.synapse-admin-http.rule=Host(`admin.matrix.vir.group`)
      - traefik.http.routers.synapse-admin-http.priority=50
      - traefik.http.routers.synapse-admin-http.middlewares=admin-redirect
      - traefik.http.middlewares.admin-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.admin-redirect.redirectscheme.permanent=true
      - traefik.http.services.synapse-admin.loadbalancer.server.port=80

  # -----------------------------------------------------------
  # Bridge-API — Supabase JWT ↔ Matrix login + user sync
  # -----------------------------------------------------------
  bridge-api:
    build:
      context: ./bridge-api
      dockerfile: Dockerfile
    container_name: bridge-api
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    environment:
      BRIDGE_PUBLIC_URL:           ${BRIDGE_PUBLIC_URL}
      BRIDGE_LOG_LEVEL:            ${BRIDGE_LOG_LEVEL}
      BRIDGE_SUPABASE_URL:         ${BRIDGE_SUPABASE_URL}
      BRIDGE_SUPABASE_JWT_SECRET:  ${BRIDGE_SUPABASE_JWT_SECRET}
      BRIDGE_SUPABASE_SERVICE_ROLE: ${BRIDGE_SUPABASE_SERVICE_ROLE}
      BRIDGE_SYNAPSE_INTERNAL_URL: http://synapse:8008
      BRIDGE_SYNAPSE_SERVER_NAME:  ${SYNAPSE_SERVER_NAME}
      BRIDGE_SYNAPSE_ADMIN_TOKEN:  ${BRIDGE_SYNAPSE_ADMIN_TOKEN}
      BRIDGE_WEBHOOK_SECRET:       ${BRIDGE_WEBHOOK_SECRET:-}
    networks: [matrix-internal, traefik-public]
    expose:
      - "8000"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.bridge-api.entrypoints=https
      - traefik.http.routers.bridge-api.rule=Host(`bridge.vir.group`)
      - traefik.http.routers.bridge-api.priority=50
      - traefik.http.routers.bridge-api.tls=true
      - traefik.http.routers.bridge-api.tls.certresolver=letsencrypt
      - traefik.http.routers.bridge-api.service=bridge-api
      - traefik.http.routers.bridge-api-http.entrypoints=http
      - traefik.http.routers.bridge-api-http.rule=Host(`bridge.vir.group`)
      - traefik.http.routers.bridge-api-http.priority=50
      - traefik.http.routers.bridge-api-http.middlewares=bridge-redirect
      - traefik.http.middlewares.bridge-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.bridge-redirect.redirectscheme.permanent=true
      - traefik.http.services.bridge-api.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/v1/matrix/health',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # Sygnal — push gateway (FCM v1 + APNs)
  # Reachable two ways:
  #   1. https://push.vir.group/_matrix/push/v1/notify   (own host)
  #   2. https://matrix.vir.group/_matrix/push/v1/notify (path-routed,
  #      higher priority than synapse so the prefix wins)
  # Synapse → Sygnal still goes via the matrix-internal network using
  # the cleartext URL http://sygnal:5000 (set in synapse pushers).
  # Secrets bind-mounted from /data/matrix-stack-secrets on the host.
  # -----------------------------------------------------------
  sygnal:
    build:
      context: ./sygnal
      dockerfile: Dockerfile
    container_name: sygnal
    restart: unless-stopped
    environment:
      SYGNAL_FCM_PROJECT_ID:           ${SYGNAL_FCM_PROJECT_ID}
      SYGNAL_FCM_SERVICE_ACCOUNT_PATH: ${SYGNAL_FCM_SERVICE_ACCOUNT_PATH}
      SYGNAL_APNS_KEY_PATH:            ${SYGNAL_APNS_KEY_PATH}
      SYGNAL_APNS_KEY_ID:              ${SYGNAL_APNS_KEY_ID}
      SYGNAL_APNS_TEAM_ID:             ${SYGNAL_APNS_TEAM_ID}
      SYGNAL_APNS_BUNDLE_ID:           ${SYGNAL_APNS_BUNDLE_ID}
    volumes:
      - /data/matrix-stack-secrets:/secrets:ro
    networks: [matrix-internal, traefik-public]
    expose:
      - "5000"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      # Dedicated host: push.vir.group
      - traefik.http.routers.sygnal-host.entrypoints=https
      - traefik.http.routers.sygnal-host.rule=Host(`push.vir.group`)
      - traefik.http.routers.sygnal-host.priority=50
      - traefik.http.routers.sygnal-host.tls=true
      - traefik.http.routers.sygnal-host.tls.certresolver=letsencrypt
      - traefik.http.routers.sygnal-host.service=sygnal
      - traefik.http.routers.sygnal-host-http.entrypoints=http
      - traefik.http.routers.sygnal-host-http.rule=Host(`push.vir.group`)
      - traefik.http.routers.sygnal-host-http.priority=50
      - traefik.http.routers.sygnal-host-http.middlewares=sygnal-redirect
      # Path under matrix.vir.group (priority > synapse so prefix wins)
      - traefik.http.routers.sygnal-path.entrypoints=https
      - traefik.http.routers.sygnal-path.rule=Host(`matrix.vir.group`) && PathPrefix(`/_matrix/push/v1`)
      - traefik.http.routers.sygnal-path.priority=200
      - traefik.http.routers.sygnal-path.tls=true
      - traefik.http.routers.sygnal-path.tls.certresolver=letsencrypt
      - traefik.http.routers.sygnal-path.service=sygnal
      - traefik.http.middlewares.sygnal-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.sygnal-redirect.redirectscheme.permanent=true
      - traefik.http.services.sygnal.loadbalancer.server.port=5000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/5000"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # LiveKit — SFU for group voice/video calls (Element Call).
  # Bridge networking with explicit port-mappings: 7880 (signaling)
  # is proxied by Traefik via livekit.matrix.vir.group; 7881/tcp +
  # 7882-7999/udp are media. UDP range stays BELOW Linux's ephemeral
  # range (32768-60999) to avoid conflicts with outbound sockets.
  # -----------------------------------------------------------
  livekit:
    build:
      context: ./livekit
      dockerfile: Dockerfile
    container_name: livekit
    restart: unless-stopped
    environment:
      LIVEKIT_API_KEY:    ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    ports:
      - "7881:7881"                   # TCP RTC fallback
      - "7882-7999:7882-7999/udp"     # WebRTC media
    networks: [matrix-internal, traefik-public]
    expose:
      - "7880"
    # Routing for livekit.matrix.vir.group is provided via Traefik's
    # file-provider at /home/vir/stacks/traefik/dynamic/livekit.yaml
    # (Docker provider auto-discovery silently drops the labels on
    # this container — likely the ports[] block confuses port detection).
    healthcheck:
      # LiveKit upstream image has no /bin/bash; use socat-style probe.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 7880 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # coturn — TURN/STUN for Matrix 1:1 mesh calls (flutter_webrtc).
  # Host networking is mandatory: coturn binds the relay UDP range
  # plus advertises the host's public IP, which docker-proxy mangles.
  # UFW must allow:
  #   3478/udp, 3478/tcp, 5349/udp, 5349/tcp, 49152-49200/udp.
  # Auth: REST API time-limited credentials shared with Synapse via
  # COTURN_STATIC_AUTH_SECRET (== synapse turn_shared_secret).
  # -----------------------------------------------------------
  coturn:
    build:
      context: ./coturn
      dockerfile: Dockerfile
    container_name: coturn
    restart: unless-stopped
    network_mode: host
    environment:
      COTURN_REALM:              ${COTURN_REALM}
      COTURN_EXTERNAL_IP:        ${COTURN_EXTERNAL_IP}
      COTURN_STATIC_AUTH_SECRET: ${COTURN_STATIC_AUTH_SECRET}
    healthcheck:
      # Alpine sh is busybox/dash — no /dev/tcp pseudo-fs. coturn's
      # Dockerfile installs bash; use it explicitly.
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/3478"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
