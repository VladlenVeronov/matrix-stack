# =============================================================
# matrix-stack — production compose for Coolify
# Phase 1d: Synapse + Postgres + Redis + Admin + bridge-api + Sygnal + LiveKit
# =============================================================

networks:
  matrix-internal:
    driver: bridge

volumes:
  synapse-data:
  postgres-matrix-data:
  redis-matrix-data:

services:

  # -----------------------------------------------------------
  # Postgres — dedicated to Synapse (NOT the Supabase one)
  # -----------------------------------------------------------
  postgres-matrix:
    image: postgres:16-alpine
    container_name: postgres-matrix
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MATRIX_PG_USER}
      POSTGRES_PASSWORD: ${MATRIX_PG_PASSWORD}
      POSTGRES_DB: ${MATRIX_PG_DB}
      # Synapse requires C locale for collation
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-matrix-data:/var/lib/postgresql/data
    networks: [matrix-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MATRIX_PG_USER} -d ${MATRIX_PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------
  # Redis — replication / presence / caching
  # -----------------------------------------------------------
  redis-matrix:
    image: redis:7-alpine
    container_name: redis-matrix
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${MATRIX_REDIS_PASSWORD}", "--save", "60", "1000"]
    volumes:
      - redis-matrix-data:/data
    networks: [matrix-internal]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${MATRIX_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------
  # Synapse — Matrix homeserver
  # -----------------------------------------------------------
  synapse:
    build:
      context: ./synapse
      dockerfile: Dockerfile
    container_name: synapse
    restart: unless-stopped
    depends_on:
      postgres-matrix:
        condition: service_healthy
      redis-matrix:
        condition: service_healthy
    environment:
      SYNAPSE_SERVER_NAME: ${SYNAPSE_SERVER_NAME}
      SYNAPSE_PUBLIC_BASEURL: ${SYNAPSE_PUBLIC_BASEURL}
      SYNAPSE_REPORT_STATS: ${SYNAPSE_REPORT_STATS}
      SYNAPSE_ENABLE_REGISTRATION: ${SYNAPSE_ENABLE_REGISTRATION}
      SYNAPSE_ALLOW_GUEST_ACCESS: ${SYNAPSE_ALLOW_GUEST_ACCESS}
      SYNAPSE_PASSWORD_LOGIN_ENABLED: ${SYNAPSE_PASSWORD_LOGIN_ENABLED}
      SYNAPSE_REGISTRATION_SHARED_SECRET: ${SYNAPSE_REGISTRATION_SHARED_SECRET}
      SYNAPSE_MACAROON_SECRET_KEY: ${SYNAPSE_MACAROON_SECRET_KEY}
      SYNAPSE_FORM_SECRET: ${SYNAPSE_FORM_SECRET}
      SYNAPSE_MAX_UPLOAD_SIZE_MB: ${SYNAPSE_MAX_UPLOAD_SIZE_MB}
      MATRIX_PG_HOST: ${MATRIX_PG_HOST}
      MATRIX_PG_PORT: ${MATRIX_PG_PORT}
      MATRIX_PG_USER: ${MATRIX_PG_USER}
      MATRIX_PG_PASSWORD: ${MATRIX_PG_PASSWORD}
      MATRIX_PG_DB: ${MATRIX_PG_DB}
      MATRIX_REDIS_PASSWORD: ${MATRIX_REDIS_PASSWORD}
    volumes:
      - synapse-data:/data
    ports:
      # exposed only inside Coolify network — Caddy proxies 8008
      - "8008"
    networks: [matrix-internal]
    labels:
      - "traefik.docker.network=q50663r5jw52lfmbv86vb4i6"
      - "traefik.http.services.https-0-q50663r5jw52lfmbv86vb4i6-synapse.loadbalancer.server.port=8008"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # -----------------------------------------------------------
  # Synapse-Admin — web UI for moderation / user management
  # -----------------------------------------------------------
  synapse-admin:
    image: awesometechnologies/synapse-admin:0.10.3
    container_name: synapse-admin
    restart: unless-stopped
    environment:
      REACT_APP_SERVER: ${SYNAPSE_PUBLIC_BASEURL}
    ports:
      - "80"
    networks: [matrix-internal]
    labels:
      - "traefik.docker.network=q50663r5jw52lfmbv86vb4i6"
      - "traefik.http.services.https-0-q50663r5jw52lfmbv86vb4i6-synapse-admin.loadbalancer.server.port=80"

  # -----------------------------------------------------------
  # Bridge-API — Supabase JWT ↔ Matrix login + user sync
  # -----------------------------------------------------------
  bridge-api:
    build:
      context: ./bridge-api
      dockerfile: Dockerfile
    container_name: bridge-api
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    environment:
      BRIDGE_PUBLIC_URL:           ${BRIDGE_PUBLIC_URL}
      BRIDGE_LOG_LEVEL:            ${BRIDGE_LOG_LEVEL}
      BRIDGE_SUPABASE_URL:         ${BRIDGE_SUPABASE_URL}
      BRIDGE_SUPABASE_JWT_SECRET:  ${BRIDGE_SUPABASE_JWT_SECRET}
      BRIDGE_SUPABASE_SERVICE_ROLE: ${BRIDGE_SUPABASE_SERVICE_ROLE}
      BRIDGE_SYNAPSE_INTERNAL_URL: http://synapse:8008
      BRIDGE_SYNAPSE_SERVER_NAME:  ${SYNAPSE_SERVER_NAME}
      BRIDGE_SYNAPSE_ADMIN_TOKEN:  ${BRIDGE_SYNAPSE_ADMIN_TOKEN}
      BRIDGE_WEBHOOK_SECRET:       ${BRIDGE_WEBHOOK_SECRET:-}
    ports:
      - "8000"
    networks: [matrix-internal]
    labels:
      - "traefik.docker.network=q50663r5jw52lfmbv86vb4i6"
      - "traefik.http.services.https-0-q50663r5jw52lfmbv86vb4i6-bridge-api.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/v1/matrix/health',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # Sygnal — push gateway (FCM v1 + APNs)
  # Forwards pushes from Synapse to Google / Apple. Privacy-first:
  # only event_id + room_id reach FCM/APNs (E2EE body stays on server).
  # Secrets are bind-mounted from /data/matrix-stack-secrets on the host.
  # -----------------------------------------------------------
  sygnal:
    build:
      context: ./sygnal
      dockerfile: Dockerfile
    container_name: sygnal
    restart: unless-stopped
    environment:
      SYGNAL_FCM_PROJECT_ID:           ${SYGNAL_FCM_PROJECT_ID}
      SYGNAL_FCM_SERVICE_ACCOUNT_PATH: ${SYGNAL_FCM_SERVICE_ACCOUNT_PATH}
      SYGNAL_APNS_KEY_PATH:            ${SYGNAL_APNS_KEY_PATH}
      SYGNAL_APNS_KEY_ID:              ${SYGNAL_APNS_KEY_ID}
      SYGNAL_APNS_TEAM_ID:             ${SYGNAL_APNS_TEAM_ID}
      SYGNAL_APNS_BUNDLE_ID:           ${SYGNAL_APNS_BUNDLE_ID}
    volumes:
      - /data/matrix-stack-secrets:/secrets:ro
    ports:
      - "5000"
    networks: [matrix-internal]
    labels:
      - "traefik.docker.network=q50663r5jw52lfmbv86vb4i6"
      - "traefik.http.services.https-0-q50663r5jw52lfmbv86vb4i6-sygnal.loadbalancer.server.port=5000"
    healthcheck:
      # Sygnal exposes only POST endpoints — no plain GET 200 path.
      # /bin/sh is dash and doesn't have /dev/tcp; use bash explicitly.
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/5000"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # LiveKit — SFU for group voice/video calls (Element Call).
  # Uses host networking — required for WebRTC because docker-proxy
  # struggles with thousands of UDP ports and conflicts with the
  # kernel's ephemeral range (32768-60999). With host network the
  # container binds 7880/tcp + 7881/tcp + 50000-60000/udp directly.
  # -----------------------------------------------------------
  livekit:
    build:
      context: ./livekit
      dockerfile: Dockerfile
    container_name: livekit
    restart: unless-stopped
    environment:
      LIVEKIT_API_KEY:    ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    ports:
      - "7880"               # WS signaling (Coolify auto-routes via Traefik)
      - "7881:7881"          # TCP RTC fallback (NAT-restricted clients)
      - "7882-7999:7882-7999/udp"  # WebRTC media (<32768 → no ephemeral conflict)
    networks: [matrix-internal]
    # LiveKit exposes 3 different ports; Traefik can't auto-pick the one to
    # proxy, so we spell out 7880 (WebSocket signaling) explicitly.
    # The container has two networks (default + matrix-internal); pin Traefik
    # to use the project network it shares with the proxy.
    labels:
      - "traefik.docker.network=q50663r5jw52lfmbv86vb4i6"
      - "traefik.http.services.https-0-q50663r5jw52lfmbv86vb4i6-livekit.loadbalancer.server.port=7880"
      - "traefik.http.services.http-0-q50663r5jw52lfmbv86vb4i6-livekit.loadbalancer.server.port=7880"
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/7880"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
