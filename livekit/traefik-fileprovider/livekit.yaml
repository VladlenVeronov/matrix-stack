# Traefik file-provider config for livekit.matrix.vir.group.
#
# Drop this file at /home/vir/stacks/traefik/dynamic/livekit.yaml on the
# Hetzner host. Traefik watches that directory (providers.file.watch=true)
# and picks the route up immediately without restarting anything.
#
# Why a separate file: Traefik docker-provider silently drops route labels
# from the LiveKit container because it declares both a ports[] block (for
# the WebRTC TCP/UDP ranges) and an expose[] block (for the signaling
# port), which confuses its automatic port detection. Explicit file config
# sidesteps that.
#
# IMPORTANT: Traefik renders YAML files through its Go template engine, so
# avoid double-curly-brace syntax in comments — even inside a comment line
# it will fail to parse.
#
# The upstream URL http://livekit:7880 resolves via Docker DNS as both
# Traefik and LiveKit share the traefik-public network.

http:
  routers:
    livekit-https:
      entryPoints: [https]
      rule: "Host(`livekit.matrix.vir.group`)"
      service: livekit-svc
      tls:
        certResolver: letsencrypt

    livekit-http:
      entryPoints: [http]
      rule: "Host(`livekit.matrix.vir.group`)"
      service: livekit-svc
      middlewares: [livekit-redirect-https]

  middlewares:
    livekit-redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    livekit-svc:
      loadBalancer:
        servers:
          - url: "http://livekit:7880"
